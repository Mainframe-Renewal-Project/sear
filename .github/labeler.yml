documentation:
  - changed-files:
    - any-glob-to-any-file: '**.md'

meta:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/ISSUE_TEMPLATE/**'
      - '.vscode/**'
      - '.github/labeler.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'logo.svg'

build:
  - changed-files:
    - any-glob-to-any-file:
      - 'pyproject.toml'
      - 'setup.py'
      - '.github/workflows/**'
      - 'cmake/**'
      - '**.cmake'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'Makefile'

core:
  - changed-files:
    - any-glob-to-any-file:
      - 'sear/**/*'
      - 'schema.json'

tests:
  - changed-files:
    - any-glob-to-any-file:
      - 'tests/**/*'
      - 'python_tests/**'
      - 'lua_tests/**'
      - 'go_tests/**'
      - 'java_tests/**'

python:
  - changed-files:
    - any-glob-to-any-file: 'python/**.py'