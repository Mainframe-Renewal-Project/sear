repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.3
    hooks:
      - id: clang-format
        files: \.(cpp|hpp|c|h)
  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck
        entry: | 
          bash -c '
            rm -rf build/linux
            cmake --preset linux-test
            cmake --build --preset linux-test --target check
          '
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
  - repo: local
    hooks:
      - id: unit-test
        name: unit-test
        entry: | 
          bash -c '
            rm -rf build/linux
            cmake --preset linux-test -DBUILD_SHARED_LIBS=on
            cmake --build --preset linux-test --target sear
            cmake --build --preset linux-test --target test_runner
            ./build/linux/test_runner
          '
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
